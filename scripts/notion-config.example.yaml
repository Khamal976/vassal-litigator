# Шаблон конфига Notion-синхронизации для vassal-litigator.
#
# Скопируй этот файл в место хранения конфига и подставь свои data_source_id
# (получаются после bootstrap по scripts/notion-init.md).
#
# Где хранить:
#   А) Одна машина (по умолчанию): ~/.vassal/notion-config.yaml
#   Б) Кросс-машинный синк через облако (OneDrive/Dropbox/Yandex.Disk):
#      положить в синхронизируемую папку и установить env var
#      VASSAL_CONFIG_DIR на путь к этой папке. Скилл будет читать
#      $VASSAL_CONFIG_DIR/notion-config.yaml на каждой машине.
#
# Файл лежит ОДИН РАЗ на пользователя (не на дело). Все дела одного юриста
# синкаются в один и тот же Notion-workspace.

notion:
  # Опциональное поле -- ID workspace для фильтров views.
  # Можно оставить пустым, если все базы в одном workspace.
  workspace_id: null

  # ID data source каждой базы (получаются из ответа MCP-tool notion-create-database
  # в теге <data-source>, либо из URL базы в Notion -- последняя часть UUID).
  databases:
    cases: "REPLACE-WITH-CASES-DATA-SOURCE-ID"
    judges: "REPLACE-WITH-JUDGES-DATA-SOURCE-ID"
    # Опционально (этап 6.2b): профили оппонентов как Notion-DB.
    # Если задана -- skill notion-sync делает фазу 4 (upsert в Counterparties +
    # relation Cases.Оппонент → Counterparties). Если оставить пустой или
    # закомментировать -- фаза 4 пропускается тихо, остальной sync работает.
    counterparties: "REPLACE-WITH-COUNTERPARTIES-DATA-SOURCE-ID"
    # Зарезервировано на будущее (этап 7+):
    # hearings: "..."
    # deadlines: "..."
    # templates: "..."

  # Поля, которые юрист правит ВРУЧНУЮ в Notion и которые sync НЕ перезаписывает.
  # Список property-имён по каждой базе.
  fields_manual_only:
    cases:
      - "Статус"            # won/lost/active/paused/closed -- ручное решение юриста
    judges: []              # все поля Judges -- автогенерируемые из глобального профиля
    counterparties: []      # все поля Counterparties -- автогенерируемые из глобального профиля

  # Маппинг внутренних имён vassal-litigator → имена property в Notion.
  # Если в Notion поля переименованы (например, "Номер дела" → "Case number"),
  # измени значения справа. Ключи слева не трогать.
  fields_map:
    cases:
      title: "Номер дела"
      court: "Суд"
      our_client: "Наш клиент"
      plaintiff: "Истец"
      defendant: "Ответчик"
      our_role: "Наша роль"
      stage: "Стадия"
      status_manual: "Статус"
      next_hearing: "Следующее заседание"
      judge_relation: "Судья"
      opponent_relation: "Оппонент"    # этап 6.2b
      folder_url: "Путь к папке"
      last_sync: "Last sync"
    judges:
      title: "ФИО"
      court: "Суд"
      slug: "slug"
      style: "Стиль"
      patterns: "Паттерны"
      tendencies: "Склонности"
      cases_count: "Дел с ним"
      last_sync: "Last sync"
    counterparties:                    # этап 6.2b
      title: "Организация"
      inn: "ИНН"
      ogrn: "ОГРН"
      slug: "slug"
      typical_arguments: "Типовые доводы"
      tactics: "Тактика"
      representatives: "Представители"
      cases_count: "Дел с ним"
      last_sync: "Last sync"

  # Опционально: владелец дел (для команды из нескольких юристов на одной workspace).
  # Если указано -- передаётся как property в обе базы для фильтрации views.
  # Если null -- однопользовательский режим.
  owner: null

  # Опционально: глобальный rate-limit для batch-операций (например, backfill из 50+ дел).
  # В обычном sync (одно дело) не используется.
  rate_limit:
    requests_per_second: 1
