# Схема case.yaml v4
# Этот файл описывает структуру карточки дела.
# При создании case.yaml через init-case — заполни известные поля, остальные оставь null.
#
# Изменения v2 → v3:
# - Добавлены блоки qualification, jurisdiction (writes: legal-review).
# - Добавлены блоки appeal, cassation (writes: appeal, cassation).
# - Расширено множество значений status: добавлены pending_appeal, pending_cassation.
# - Поля снабжены комментариями `# writes: <скиллы>` — матрица ownership
#   (см. shared/conventions.md, раздел «Ownership полей case.yaml»).
# - Уточнено использование parties[].inn / parties[].ogrn как ключа дедупликации
#   для глобальной памяти (см. shared/conventions.md, раздел «Глобальная память (кросс-дельная)»):
#   add-opponent читает inn оппонента и пишет наблюдения в $VASSAL_GLOBAL_DIR/counterparties/inn-{ИНН}.md.
#   При отсутствии inn используется fallback noinn-{slug-name}.md, точность дедупликации падает.
#
# Изменения v3 → v4:
# - Добавлен блок settlement (writes: settlement; частично analyze-hearing для confirmed_date).
# - Расширено множество значений status: добавлены pending_settlement, settled, withdrawn.
# - В блок cassation добавлены target + appealed_ruling_doc_id — под обжалование
#   определений по ст. 141 АПК (мировое) и ст. 151 АПК (прекращение производства),
#   которые идут в кассацию минуя апелляцию.

version: 4

case:
  number: "А33-12345/2026"         # writes: init-case   | Номер дела. null если дело ещё не возбуждено.
  court: "Название суда"            # writes: init-case   | Полное название суда
  judge: "ФИО судьи"               # writes: init-case, analyze-hearing  | null если неизвестно
  category: "экономические споры"   # writes: init-case   | экономические споры | банкротство | административные
  subject: "Суть спора в 1 предложении"  # writes: init-case
  status: active                    # writes: init-case, appeal, cassation, analyze-hearing, settlement
                                    # Допустимые значения:
                                    #   active               — дело в работе (1 инстанция)
                                    #   suspended            — приостановлено судом
                                    #   pending_appeal       — решение вынесено, готовим/подали апелляцию
                                    #   pending_cassation    — апелляция рассмотрена, готовим/подали кассацию
                                    #   pending_settlement   — settlement-трек активен, утверждения суда ещё нет (writes: settlement)
                                    #   settled              — мировое утверждено судом (writes: settlement)
                                    #   withdrawn            — производство прекращено по отказу истца от иска (writes: settlement)
                                    #   completed            — судебные акты вступили в силу, исполнено
                                    #   archived             — дело закрыто и убрано в архив
                                    # Признание иска отдельного статуса не получает: оно ведёт к решению,
                                    # дальше обычная цепочка (completed / pending_appeal).

  # Даты
  filing_date: null                 # writes: init-case   | Дата подачи иска (ГГГГ-ММ-ДД)
  next_hearing: null                # writes: init-case, analyze-hearing  | Дата следующего заседания
  next_hearing_source: null         # writes: init-case, analyze-hearing  | user | transcript | kad

  # Стороны
  # Каждая сторона имеет стабильный party_id для ссылок из других структур.
  # Формат party_id: {role}-{NN}, например plaintiff-01, defendant-01, third-party-01
  # writes: init-case (структура), legal-review (уточнение реквизитов после анализа документов)
  #
  # ВАЖНО для оппонента (роль ≠ роли our_client):
  # - inn/ogrn -- ключ дедупликации в глобальной памяти $VASSAL_GLOBAL_DIR/counterparties/.
  # - Если inn известен (даже из шапки иска / отзыва) -- заполнить ОБЯЗАТЕЛЬНО при init-case
  #   или дополнить через legal-review после анализа документов оппонента.
  # - Без inn add-opponent использует fallback noinn-{slug-name}.md, что снижает точность
  #   кросс-дельного матчинга (омонимы, разные правописания одного контрагента).
  parties:
    - party_id: "plaintiff-01"
      role: "Истец"                 # Истец | Ответчик | Третье лицо | Заявитель | Заинтересованное лицо
      name: "Полное наименование"
      short_name: "Краткое"
      inn: null                     # ИНН (10 или 12 цифр) -- для оппонента ключ глобальной памяти, см. выше
      ogrn: null                    # ОГРН (13 или 15 цифр) -- доп. идентификатор
      address: null                 # Юридический адрес
      representative: null          # ФИО представителя стороны

    - party_id: "defendant-01"
      role: "Ответчик"
      name: "Полное наименование"
      short_name: "Краткое"
      inn: null                     # ИНН -- ключ глобальной памяти для оппонента
      ogrn: null
      address: null
      representative: null

  # Наш клиент — ссылка на party_id
  our_client:
    party_id: "defendant-01"        # writes: init-case   | Какая из сторон — наш клиент

  # Представитель (наш юрист)
  # writes: init-case
  representative:
    name: null                      # ФИО
    short_name: null                # Инициалы: "Я. А. Стригов"
    position: "Представитель"
    power_of_attorney: null         # "Доверенность от ДД.ММ.ГГГГ"
    address: null
    phone: null
    email: null

  # Суммы
  # writes: init-case (исходные значения), build-position (уточнение в ходе расчётов)
  amounts:
    claim: null                     # Сумма иска (число)
    court_fee: null                 # Госпошлина (число)

  # Квалификация правоотношений — заполняется на этапе legal-review
  # writes: legal-review, build-position (может уточнить applicable_norms)
  # reads: build-position, prepare-hearing, appeal, cassation
  qualification:
    relation_type: null             # поставка | подряд | услуги | аренда | заём | неосновательное обогащение | ...
    applicable_norms: []            # Список ключевых норм: ["ст. 506 ГК", "ст. 711 ГК", "ФЗ о контрактной системе"]
    qualified_by: null              # agent | user
    qualified_at: null              # Дата квалификации (ГГГГ-ММ-ДД)

  # Подсудность — заполняется на этапе legal-review
  # writes: legal-review
  # reads: build-position, prepare-hearing, appeal, cassation
  jurisdiction:
    competent_court: null           # арбитражный | СОЮ | КАС | банкротный
    territorial_basis: null         # общая | договорная | исключительная | альтернативная
    correct: null                   # true | false | null — соответствует ли фактическая подсудность правильной
    prorogation_clause: null        # Текст оговорки о подсудности из договора (или null)

  # Досудебный порядок — заполняется на этапе legal-review, не при init-case
  # writes: legal-review
  pretrial:
    required: null                  # true | false | null
    required_source: null           # user | agent | document
    complied: null                  # true | false | null
    complied_source: null           # user | agent
    pretrial_date: null             # Дата направления претензии

  # Settlement — мировое соглашение / отказ от иска / признание иска
  # writes: settlement (основные поля), analyze-hearing (confirmed_date после заседания,
  #         если суд утвердил / принял отказ / принял признание прямо в нём)
  # reads: prepare-hearing (для хука «у нас активный settlement»),
  #        cassation (если confirmed_date != null и обжалуется определение по ст. 141 АПК)
  settlement:
    mode: null                      # MVP-валидатор: 'agreement' | 'withdrawal' | 'admission'
                                    #   agreement  — мировое соглашение (ст. 138-142 АПК).
                                    #                Допустимо на любой стадии и в исполнительном производстве
                                    #                (ст. 139 ч. 1 АПК); см. совместимость со stage ниже.
                                    #   withdrawal — отказ от иска нашим истцом (ст. 49 ч. 2, 150 ч. 1 п. 4 АПК).
                                    #                Возможен до удаления суда в совещательную комнату в 1 инст.;
                                    #                в апелляции/кассации — как результат примирения по ст. 138.6
                                    #                АПК (отказ принимается судом проверочной инстанции).
                                    #   admission  — признание иска нашим ответчиком (ст. 49 ч. 3 АПК).
                                    #                По существу — институт первой инстанции. После вынесения
                                    #                решения 1 инст. признание иска как самостоятельный
                                    #                инструмент бессмысленно (предмет уже разрешён);
                                    #                в проверочных инстанциях аналогичную задачу решает либо
                                    #                мировое (mode='agreement'), либо отказ от жалобы
                                    #                (mode='appeal_withdrawal', пост-MVP). Поэтому MVP-валидатор
                                    #                для admission допускает только stage='1inst'.
                                    # Зарезервированы под пост-MVP расширения по ст. 138.6 АПК:
                                    #   appeal_withdrawal       — отказ от апелляционной/кассационной жалобы
                                    #   facts_agreement         — соглашение по обстоятельствам (ст. 70 ч. 2 АПК)
                                    #   circumstances_admission — признание обстоятельств
                                    #   tm_consent              — письмо-согласие на регистрацию товарного знака
                                    # При попытке записать зарезервированное значение в MVP — отказать.
    initiator: null                 # 'us' | 'opponent' | 'mutual' — кто инициировал трек
    stage: null                     # '1inst' | 'appeal' | 'cassation' | 'enforcement' — стадия,
                                    # на которой заключается результат примирения.
                                    # Последствия для процесса различаются по стадии (ст. 141 АПК):
                                    #   1inst       — утверждение мирового / принятие отказа от иска →
                                    #                  прекращение производства по делу.
                                    #                  Госпошлина: возврат 70% по ст. 333.40 НК.
                                    #   appeal      — утверждение мирового / принятие отказа →
                                    #                  ОТМЕНА решения 1 инст. + прекращение производства
                                    #                  (ст. 141 ч. 13 АПК). Госпошлина: возврат 50%.
                                    #   cassation   — утверждение мирового / принятие отказа →
                                    #                  ОТМЕНА актов нижестоящих инстанций + прекращение
                                    #                  производства. Госпошлина: возврат 30%.
                                    #   enforcement — мировое утверждается судом 1 инст. (по месту
                                    #                  исполнения судебного акта); определение влечёт
                                    #                  прекращение исполнительного производства
                                    #                  (ст. 43 ч. 2 п. 3 ФЗ-229). Возврат госпошлины
                                    #                  по делу не производится (уже исчерпана исполнением).
                                    # Эти последствия SKILL settlement учитывает в фазе 4 через
                                    # ветвление просительной части ходатайства об утверждении (отмена
                                    # нижестоящих актов / прекращение исполнительного производства).
                                    # Совместимость mode × stage (MVP-валидатор):
                                    #   agreement  × {1inst, appeal, cassation, enforcement} — OK.
                                    #   withdrawal × {1inst, appeal, cassation}              — OK.
                                    #   withdrawal × enforcement                              — отказать
                                    #     (на стадии исполнения отказ от иска утратил смысл — иск удовлетворён).
                                    #   admission  × 1inst                                    — OK.
                                    #   admission  × {appeal, cassation, enforcement}         — отказать
                                    #     (см. пояснение к mode='admission' выше).
    draft_date: null                # Дата подготовки проекта документа (ГГГГ-ММ-ДД)
    filed_date: null                # Дата подачи в суд
    confirmed_date: null            # Дата определения суда об утверждении мирового / о принятии отказа /
                                    # или решения суда о принятии признания иска
    court_ruling_id: null           # doc-id определения/решения суда в index.yaml (если попало в индекс)
    in_progress: false              # true пока трек активен (между draft_date и confirmed_date или отменой);
                                    # false после confirmed_date или явной отмены трека Сюзереном.
                                    # prepare-hearing читает это поле в фазе 2 п.13 для хука.

  # Апелляционная инстанция — заполняется при вынесении решения и подаче жалобы
  # writes: appeal (основные поля), analyze-hearing (hearing_date, ruling_date после заседания)
  # reads: cassation (для расчётов сроков и проверки последовательности)
  appeal:
    judgment_issued_date: null      # Дата изготовления решения 1 инстанции в полном объёме
    deadline: null                  # Расчётный срок подачи жалобы (judgment_issued_date + 1 месяц по АПК)
    filed_date: null                # Когда фактически подали апелляционную жалобу
    hearing_date: null              # Дата заседания апелляционной инстанции
    ruling_date: null               # Дата вынесения постановления апелляции
    result: null                    # upheld | overturned | modified | dismissed | null
                                    #   upheld     — решение оставлено без изменения
                                    #   overturned — отменено
                                    #   modified   — изменено
                                    #   dismissed  — производство по жалобе прекращено

  # Кассационная инстанция — симметрично appeal
  # writes: cassation (основные поля), analyze-hearing (hearing_date, ruling_date)
  cassation:
    target: null                    # На какой судебный акт жалоба:
                                    #   judgment_with_appeal — стандартный путь: решение 1 инст. + постановление апелляции
                                    #   ruling_settlement    — определение об утверждении мирового (ст. 141 ч. 9 АПК):
                                    #                          обжалуется в кассации МИНУЯ апелляцию, срок 1 месяц
                                    #   ruling_termination   — определение о прекращении производства (ст. 151 АПК):
                                    #                          обжалуется в апелляции, но если апелляция отказала —
                                    #                          в кассации; используется когда target суда — определение
                                    # null до выбора в фазе 0 cassation.
    appealed_ruling_doc_id: null    # doc-id обжалуемого определения, если target != 'judgment_with_appeal'
                                    # (для ruling_settlement / ruling_termination — это id определения в index.yaml).
    appeal_ruling_date: null        # Дата вступления в силу постановления апелляции (точка отсчёта срока)
                                    # При target != 'judgment_with_appeal' — null; вместо этого используется
                                    # дата вынесения обжалуемого определения, она же deadline -1 месяц/2 месяца.
    deadline: null                  # Расчётный срок подачи кассации:
                                    #   judgment_with_appeal: appeal_ruling_date + 2 месяца (ст. 276 АПК);
                                    #   ruling_settlement:    дата определения + 1 месяц (ст. 141 ч. 11 АПК);
                                    #   ruling_termination:   по общим правилам обжалования определений.
    filed_date: null                # Когда подали кассационную жалобу
    hearing_date: null              # Дата заседания кассационной инстанции
    ruling_date: null               # Дата вынесения постановления кассации
    result: null                    # upheld | overturned | modified | dismissed | null
    instance: null                  # окружной | СКЭС ВС РФ — какая кассация (1 или 2)

  # Хронология (пополняется по ходу дела)
  # writes (append): init-case (создание), analyze-hearing (после заседания),
  #                  appeal/cassation (подача и результат), legal-review (значимые правовые события)
  timeline:
    - date: null                    # ГГГГ-ММ-ДД
      event: "Описание события"
      source: user                  # user | transcript | agent
